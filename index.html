<body>

<h1 class="rainbow"> 200 Phone Sensitivity </h1>

<input type="text" id="search" placeholder="Search Phone..." onkeyup="filterPhonesAdvanced()">

<select id="phoneList" size="10" onchange="resetResult()"></select>

<div class="box" id="resultBox" style="display:none;">

/* Load Phones */
let phoneList=document.getElementById("phoneList");
function loadPhones(){
phoneList.innerHTML="";
phones.forEach(p=>{
let option=document.createElement("option");
option.text=p;
phoneList.add(option);
});
}
loadPhones();

/* Search Function */
function filterPhonesAdvanced(){
let input=document.getElementById("search").value.toLowerCase();
let options=phoneList.options;
for(let i=0;i<options.length;i++){
let txt=options[i].text.toLowerCase();
if(txt.includes(input) && input.length>0){
options[i].style.display="";
options[i].style.background="black";
options[i].style.color="white";
}else if(txt.includes(input)){
options[i].style.display="";
options[i].style.background="";
options[i].style.color="white";
}else{
options[i].style.display="none";
}
}
}

/* Reset Result */
function resetResult(){
document.getElementById("resultBox").style.display="block";
document.getElementById("deviceType").innerText="Select Option";
document.getElementById("general").innerText="General: -";
document.getElementById("red").innerText="Red Dot: -";
document.getElementById("x2").innerText="2x Scope: -";
document.getElementById("x4").innerText="4x Scope: -";
document.getElementById("sniper").innerText="Sniper: -";
document.getElementById("free").innerText="Free Camera: -";
document.getElementById("dpi").innerText="DPI: -";
}

/* Random Sensitivity */
function random(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

function setSensi(type){
let high = (type==="high");
document.getElementById("deviceType").innerText=high?"High Device Sensitivity":"Low Device Sensitivity";
document.getElementById("general").innerText="General: "+(high?random(180,200):random(140,165));
document.getElementById("red").innerText="Red Dot: "+(high?random(175,195):random(135,155));
document.getElementById("x2").innerText="2x Scope: "+(high?random(170,185):random(130,145));
document.getElementById("x4").innerText="4x Scope: "+(high?random(165,175):random(125,135));
document.getElementById("sniper").innerText="Sniper: "+(high?random(160,170):random(120,130));
document.getElementById("free").innerText="Free Camera: "+(high?random(175,190):random(135,155));
document.getElementById("dpi").innerText="DPI: "+(high?random(500,600):random(400,450));
}

/* Modal Functions */
function openModal(type){
let title=document.getElementById("modalTitle");
let text=document.getElementById("modalText");
document.getElementById("modal").style.display="block";

if(type==="privacy"){
title.innerText="Privacy Policy";
text.innerText=`We care deeply about your privacy and protecting your personal information. 
This section explains how we collect, use, and secure your data while using our services. 
We never share your personal data with third parties without your explicit consent. 
You have full control over your information and can view, update, or delete it anytime.`;
}else if(type==="terms"){
title.innerText="Terms of Service";
text.innerText=`These are the rules and conditions that govern the use of our website or application. 
Users must provide accurate and lawful information. Illegal, harmful, or disruptive activities are prohibited. 
We reserve the right to modify these terms at any time. By using our services, you accept these terms fully.`;
}else if(type==="about"){
title.innerText="About Us";
text.innerText=`We are [Your Company Name], dedicated to delivering high-quality and user-friendly services. 
Our mission is to create a seamless experience for every user, using advanced technology to simplify digital interactions. 
Our team works tirelessly to ensure security, transparency, and continuous improvement. 
We welcome all questions, suggestions, and feedback from our users.`;
}
}

function closeModal(){
document.getElementById("modal").style.display="none";
}
